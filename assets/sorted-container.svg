    <rect x="120" y="88" width="56" height="50"/><rect x="176" y="88" width="56" height="50"/><rect x="232" y="88" width="56" height="50"/><rect x="288" y="88" width="56" height="50"/><rect x="344" y="88" width="56" height="50"/>
