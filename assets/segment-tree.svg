<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="1" y="1" width="518" height="298" rx="10" fill="#ffffff" stroke="#e2e8f0"/>

  <g stroke="#94a3b8" stroke-width="1.5">
    <line x1="260" y1="56" x2="160" y2="130"/><line x1="260" y1="56" x2="360" y2="130"/>
    <line x1="160" y1="130" x2="120" y2="206"/><line x1="160" y1="130" x2="200" y2="206"/>
    <line x1="360" y1="130" x2="320" y2="206"/><line x1="360" y1="130" x2="400" y2="206"/>
  </g>

  <g stroke="#94a3b8">
    <circle cx="260" cy="56" r="20" fill="#fde68a" stroke="#d97706" stroke-width="2"/>
    <circle cx="160" cy="130" r="20" fill="#f1f5f9"/>
    <circle cx="360" cy="130" r="20" fill="#f1f5f9"/>
  </g>
  <g fill="#1e293b" font-size="18" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="260" y="62">11</text><text x="160" y="136">3</text><text x="360" y="136">8</text>
  </g>
  <text x="298" y="52" fill="#d97706" font-size="12" font-weight="600">sum of [0..3]</text>
  <text x="126" y="118" fill="#475569" font-size="12" text-anchor="end" font-family="ui-monospace,Menlo,monospace">2+1</text>
  <text x="394" y="118" fill="#475569" font-size="12" font-family="ui-monospace,Menlo,monospace">5+3</text>

  <g fill="#f1f5f9" stroke="#94a3b8">
    <rect x="94" y="206" width="52" height="40"/><rect x="174" y="206" width="52" height="40"/><rect x="294" y="206" width="52" height="40"/><rect x="374" y="206" width="52" height="40"/>
  </g>
  <g fill="#1e293b" font-size="18" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="120" y="232">2</text><text x="200" y="232">1</text><text x="320" y="232">5</text><text x="400" y="232">3</text>
  </g>
  <g fill="#94a3b8" font-size="11" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="120" y="262">0</text><text x="200" y="262">1</text><text x="320" y="262">2</text><text x="400" y="262">3</text>
  </g>

  <text x="260" y="286" fill="#475569" font-size="13" text-anchor="middle">each node stores the sum of its range; a query touches O(log n) nodes</text>
</svg>
