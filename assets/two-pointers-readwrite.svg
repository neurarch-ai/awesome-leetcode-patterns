<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="1" y="1" width="518" height="198" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <g fill="#94a3b8" font-size="12" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="120" y="50">0</text><text x="176" y="50">1</text><text x="232" y="50">2</text><text x="288" y="50">3</text><text x="344" y="50">4</text><text x="400" y="50">5</text>
  </g>
  <g stroke="#86efac" fill="#dcfce7">
    <rect x="92" y="60" width="56" height="50"/><rect x="148" y="60" width="56" height="50"/><rect x="204" y="60" width="56" height="50"/>
  </g>
  <g stroke="#94a3b8" fill="#f1f5f9">
    <rect x="260" y="60" width="56" height="50"/><rect x="316" y="60" width="56" height="50"/><rect x="372" y="60" width="56" height="50"/>
  </g>
  <g fill="#1e293b" font-size="20" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="120" y="93">1</text><text x="176" y="93">2</text><text x="232" y="93">3</text><text x="288" y="93">3</text><text x="344" y="93">4</text><text x="400" y="93">4</text>
  </g>
  <text x="176" y="132" fill="#059669" font-size="11.5" text-anchor="middle">kept prefix</text>
  <polygon points="232,118 224,130 240,130" fill="#2563eb"/>
  <text x="232" y="149" fill="#2563eb" font-size="13" text-anchor="middle" font-weight="600">slow (write)</text>
  <polygon points="344,118 336,130 352,130" fill="#dc2626"/>
  <text x="344" y="149" fill="#dc2626" font-size="13" text-anchor="middle" font-weight="600">fast (read)</text>
  <text x="260" y="180" fill="#475569" font-size="12.5" text-anchor="middle">fast reads every element; slow writes only the ones to keep. One pass, O(1) space.</text>
</svg>
