<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 262" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="1" y="1" width="518" height="260" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <g stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)">
    <line x1="114.1" y1="114.2" x2="280.9" y2="63.8"/>
    <line x1="269.1" y1="174.0" x2="420.9" y2="126.0"/>
  </g>
  <g stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowBlue)">
    <line x1="113.7" y1="127.2" x2="231.3" y2="172.8"/>
    <line x1="257.6" y1="161.5" x2="292.4" y2="76.5"/>
    <line x1="318.3" y1="66.1" x2="421.7" y2="111.9"/>
  </g>
  <g stroke="#60a5fa" stroke-width="2">
    <circle cx="95" cy="120" r="20" fill="#dbeafe"/>
    <circle cx="300" cy="58" r="20" fill="#dbeafe"/>
    <circle cx="250" cy="180" r="20" fill="#dbeafe"/>
    <circle cx="440" cy="120" r="20" fill="#dbeafe"/>
  </g>
  <g fill="#1e293b" font-size="18" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="95" y="126">A</text><text x="300" y="64">B</text><text x="250" y="186">C</text><text x="440" y="126">D</text>
  </g>
  <g font-size="13" text-anchor="middle" font-weight="600" font-family="ui-monospace,Menlo,monospace">
    <text x="196" y="77" fill="#94a3b8">4</text>
    <text x="352" y="163" fill="#94a3b8">8</text>
    <text x="166" y="162" fill="#2563eb">1</text>
    <text x="262" y="116" fill="#2563eb">2</text>
    <text x="378" y="78" fill="#2563eb">5</text>
  </g>
  <text x="260" y="226" fill="#2563eb" font-size="13" text-anchor="middle" font-weight="600">shortest A to C to B to D = 1 + 2 + 5 = 8</text>
  <text x="260" y="248" fill="#475569" font-size="13" text-anchor="middle">Dijkstra expands the closest frontier node first</text>
</svg>
