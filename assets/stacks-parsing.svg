<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="518" height="218" rx="10" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="150" y="42" fill="#475569" font-size="12.5" text-anchor="middle">input, reading left to right</text>
  <g stroke="#94a3b8" fill="#f1f5f9">
    <rect x="70" y="56" width="40" height="42"/><rect x="110" y="56" width="40" height="42"/><rect x="150" y="56" width="40" height="42" fill="#dbeafe" stroke="#60a5fa"/><rect x="190" y="56" width="40" height="42"/>
  </g>
  <g fill="#1e293b" font-size="20" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="90" y="85">(</text><text x="130" y="85">[</text><text x="170" y="85">]</text><text x="210" y="85">)</text>
  </g>
  <polygon points="170,110 162,122 178,122" fill="#2563eb"/>
  <text x="170" y="140" fill="#2563eb" font-size="11.5" text-anchor="middle">current: ] matches top [</text>

  <text x="380" y="42" fill="#475569" font-size="12.5" text-anchor="middle">stack of openers</text>
  <g stroke="#94a3b8" fill="#f1f5f9">
    <rect x="345" y="56" width="70" height="38"/><rect x="345" y="94" width="70" height="38"/>
  </g>
  <g fill="#1e293b" font-size="18" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="380" y="81">[</text><text x="380" y="119">(</text>
  </g>
  <text x="430" y="79" fill="#94a3b8" font-size="11" text-anchor="start">top</text>
  <path d="M250,77 L338,73" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#ap)"/>
  <text x="294" y="66" fill="#2563eb" font-size="11" text-anchor="middle">pop on match</text>

  <text x="260" y="200" fill="#475569" font-size="12.5" text-anchor="middle">push each opener; a closer must match the top, else the string is invalid</text>
</svg>
