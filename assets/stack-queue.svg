<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 235" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="aq" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="518" height="233" rx="10" fill="#ffffff" stroke="#e2e8f0"/>

  <text x="130" y="40" fill="#1e293b" font-size="14" text-anchor="middle" font-weight="600">Stack (LIFO)</text>
  <g stroke="#94a3b8" fill="#f1f5f9">
    <rect x="95" y="60" width="70" height="34"/><rect x="95" y="94" width="70" height="34"/><rect x="95" y="128" width="70" height="34"/>
  </g>
  <g fill="#1e293b" font-size="16" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="130" y="82">3</text><text x="130" y="116">2</text><text x="130" y="150">1</text>
  </g>
  <path d="M175,64 L200,52" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#aq)"/>
  <text x="205" y="52" fill="#2563eb" font-size="12.5" font-weight="600">push / pop (top)</text>

  <text x="390" y="40" fill="#1e293b" font-size="14" text-anchor="middle" font-weight="600">Queue and deque (FIFO)</text>
  <g stroke="#94a3b8" fill="#f1f5f9">
    <rect x="300" y="78" width="56" height="40"/><rect x="356" y="78" width="56" height="40"/><rect x="412" y="78" width="56" height="40"/>
  </g>
  <g fill="#1e293b" font-size="16" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="328" y="103">1</text><text x="384" y="103">2</text><text x="440" y="103">3</text>
  </g>
  <path d="M298,98 L272,98" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#aq)"/>
  <text x="326" y="140" fill="#475569" font-size="12" text-anchor="middle">dequeue (front)</text>
  <path d="M496,98 L470,98" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#aq)"/>
  <text x="470" y="140" fill="#475569" font-size="12" text-anchor="middle">enqueue (back)</text>

  <text x="260" y="205" fill="#475569" font-size="12.5" text-anchor="middle">stack: push and pop at one end, O(1). deque: O(1) at both ends (the right BFS queue).</text>
</svg>
