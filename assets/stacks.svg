<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="1" y="1" width="518" height="278" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <defs>
    <marker id="st-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- value row -->
  <g fill="#94a3b8" font-size="11" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="52" y="42">i0</text><text x="102" y="42">i1</text><text x="152" y="42">i2</text><text x="202" y="42">i3</text><text x="252" y="42">i4</text>
  </g>
  <g fill="#f1f5f9" stroke="#94a3b8">
    <rect x="30" y="48" width="44" height="44"/><rect x="80" y="48" width="44" height="44"/><rect x="130" y="48" width="44" height="44"/><rect x="230" y="48" width="44" height="44"/>
  </g>
  <rect x="180" y="48" width="44" height="44" fill="#dbeafe" stroke="#60a5fa"/>
  <g fill="#1e293b" font-size="20" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="52" y="78">2</text><text x="102" y="78">1</text><text x="152" y="78">2</text><text x="202" y="78">4</text><text x="252" y="78">3</text>
  </g>
  <text x="202" y="108" fill="#2563eb" font-size="11" text-anchor="middle" font-weight="600">4 arrives</text>

  <!-- waiting stack -->
  <text x="82" y="146" fill="#94a3b8" font-size="11" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">waiting stack</text>
  <g fill="#f1f5f9" stroke="#94a3b8">
    <rect x="42" y="154" width="80" height="32"/><rect x="42" y="190" width="80" height="32"/>
  </g>
  <g fill="#1e293b" font-size="14" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="82" y="175">i2 (v2)</text><text x="82" y="211">i0 (v2)</text>
  </g>

  <!-- arrow from incoming 4 to stack -->
  <path d="M 202 92 C 190 122, 150 128, 124 158" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#st-arrow)"/>

  <!-- resolution arrows to the right -->
  <g stroke="#94a3b8" stroke-width="1.5" marker-end="url(#st-arrow)">
    <line x1="122" y1="170" x2="278" y2="185"/><line x1="122" y1="206" x2="278" y2="191"/>
  </g>
  <rect x="284" y="164" width="132" height="34" fill="#fde68a" stroke="#d97706" stroke-width="2" rx="4"/>
  <text x="350" y="185" fill="#1e293b" font-size="13" text-anchor="middle" font-weight="600">next greater = 4</text>

  <text x="260" y="256" fill="#475569" font-size="13" text-anchor="middle">monotonic stack: each pop resolves a next-greater</text>
</svg>
