<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 215" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="518" height="213" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
  <g stroke="#94a3b8" fill="#f1f5f9">
    <rect x="60" y="74" width="70" height="46"/><rect x="185" y="74" width="70" height="46"/><rect x="310" y="74" width="70" height="46"/><rect x="435" y="74" width="70" height="46"/>
  </g>
  <g fill="#1e293b" font-size="19" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">
    <text x="95" y="104">1</text><text x="220" y="104">2</text><text x="345" y="104">3</text><text x="470" y="104">4</text>
  </g>
  <path d="M183,110 L132,110" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arb)"/>
  <text x="157" y="140" fill="#2563eb" font-size="11" text-anchor="middle">reversed</text>
  <path d="M310,86 C280,55 250,55 222,84" stroke="#2563eb" stroke-width="1.8" fill="none" marker-end="url(#arb)"/>
  <text x="266" y="48" fill="#2563eb" font-size="11" text-anchor="middle">curr.next = prev</text>
  <path d="M383,110 L432,110" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
  <text x="95" y="150" fill="#94a3b8" font-size="12" text-anchor="middle">head</text>
  <text x="220" y="168" fill="#2563eb" font-size="13" text-anchor="middle" font-weight="600">prev</text>
  <text x="345" y="168" fill="#dc2626" font-size="13" text-anchor="middle" font-weight="600">curr</text>
  <text x="470" y="168" fill="#059669" font-size="13" text-anchor="middle" font-weight="600">next</text>
  <text x="260" y="198" fill="#475569" font-size="12.5" text-anchor="middle">reverse the link, then advance all three: prev = curr, curr = next</text>
</svg>
