name: checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run repository checks (dashes, links, images, compile)
        run: python3 scripts/check.py
      - name: Run template correctness tests (execute against known answers)
        run: python3 scripts/test_templates.py
